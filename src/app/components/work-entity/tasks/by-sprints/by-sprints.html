<div class="sprints-container" #scrollContainer>
  @for (sprint of sprints(); track sprint.id) {
    <app-sprint-card
      [canCreateSprint]="canCreateSprint()"
      [sprint]="sprint"
      [canCreateTask]="canCreateTask()"
      [tasksFilters]="tasksFilters()"
      [tasksPageSize]="sprintTasksPageSize()"
      (updateSprintsSignal)="updateSprintsList()"
    ></app-sprint-card>
  }
  @if (loading()) {
    <div class="loading">Загрузка...</div>
  }
  @if (!loading() && sprints().length === 0) {
    <div class="empty">Спринты отсутствуют</div>
  }
  <div class="tasks-without-sprint">
    <div class="d-flex flex-row align-items-center justify-content-between pt-2 pb-2">
      <div class="d-flex flex-row align-items-center">
        <button mat-icon-button class="mb-1" (click)="viewWithoutSprintTasks()">
          <mat-icon class="d-flex" [class.tasks-view-opened]="isTaskListOpen">arrow_drop_down</mat-icon>
        </button>
        <div>Список задач</div>
      </div>
      <div class="d-flex flex-row align-items-center gap-3">
        @if (canCreateSprint()) {
          <button
            mat-flat-button
            (click)="createSprint($event)"
            class="create-sprint-btn"
          >
            <span class="text-nowrap">Создать спринт</span>
          </button>
        }
      </div>
    </div>
    <div [ngStyle]="{'display': isTaskListOpen ? 'flex' : 'none'}">
      <app-tasks-list
        [canMoveToSprint]="true"
        [canCreate]="canCreateTask()"
        [filters]="getTasksWithoutSprintsFilters()"
        [pageSize]="sprintTasksPageSize()"
        (updateTaskSignal)="updateSprintsList()"
      ></app-tasks-list>
    </div>
  </div>
</div>
