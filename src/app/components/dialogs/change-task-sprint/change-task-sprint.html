<h2 mat-dialog-title>{{ title() }}</h2>
<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <mat-dialog-content class="pt-1">
    <app-entity-select
      formControlName="sprint"
      label="Спринт"
      [loadFn]="loadSprintsPage.bind(this)"
      [clearable]="true"
      [required]="data.mode === 'add'"
    ></app-entity-select>
    @if (form.get('sprint')?.hasError('required') && form.get('sprint')?.touched) {
      <mat-error>Спринт обязателен для выбора</mat-error>
    }
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="onCancel()">Отмена</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || isSaving">
      {{ isSaving ? 'Сохранение...' : 'Сохранить' }}
    </button>
  </mat-dialog-actions>
</form>
